services:

  salesflow:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/salesflow
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123

    depends_on:
      - postgres
    networks:
      - salesflow-network

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: salesflow
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - salesflow-network

volumes:
  postgres_data:

networks:
  salesflow-network:


