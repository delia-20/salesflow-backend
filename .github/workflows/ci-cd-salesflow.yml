name: SalesFlow CI/CD
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Tests
        run: mvn test

      - name: Package
        run: mvn clean package

      - name: Login Docker Hub
        uses: docker/login-action
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME}}/salesflow:1.1 .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME}}/salesflow:1.1


